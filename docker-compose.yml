services:
  cabinet:
    container_name: mimzo-cabinet
    build:
      context: .
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
    restart: unless-stopped
    env_file: .env
    environment:
      # Make Next.js standalone bind to all interfaces so the in-container
      # healthcheck (127.0.0.1:3000) can reach it — by default it binds to
      # the container hostname IP only.
      HOSTNAME: "0.0.0.0"
    ports:
      - "127.0.0.1:3000:3000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
